<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XmerOriginals | Çok Yakında</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ffffff;
            --accent-color: #ffffff;
            --bg-dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--primary-color);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, #1a1a1a 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, #111 0%, transparent 40%);
        }

        .container {
            text-align: center;
            padding: 2rem;
            z-index: 1;
            max-width: 800px;
            width: 90%;
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-img {
            max-width: 320px;
            width: 100%;
            height: auto;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));
        }

        h1 {
            font-size: clamp(2rem, 7vw, 4rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff 50%, #444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        p {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 3rem;
            font-weight: 300;
            line-height: 1.6;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .contact-box {
            display: inline-block;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .contact-box:hover {
            background: white;
            color: black;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: #ffffff;
            filter: blur(150px);
            opacity: 0.05;
            z-index: 0;
            border-radius: 50%;
        }

        .blob-1 { top: -150px; right: -100px; }
        .blob-2 { bottom: -150px; left: -100px; }

        @media (max-width: 600px) {
            .logo-img { max-width: 220px; }
            h1 { font-size: 2.5rem; }
            p { font-size: 1rem; }
            .socials { gap: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <img src="https://xmeroriginals.com/resources/XmerOriginals%20Logo%20-%20Klasik%20T2.png" alt="XMER Originals" class="logo-img">
        
        <h1>YAKINDA <br>BURADAYIZ.</h1>
        <p>Mağazamız kuruluyor...</p>

        <a href="mailto:hello@xmeroriginals.com" class="contact-box">
            hello@xmeroriginals.com
        </a>
    </div>

</body>
</html>
